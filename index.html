<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Manager</title><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon.png"><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><style>

:root { 
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--label:#64748b;
--header-bg:#1e293b;
--header-text:#ffffff;
--input-bg:#ffffff;
--input-border:#cbd5e1;
--accent:#3b82f6;
--success:#10b981;
--danger:#ef4444;
--card-inner:#f8fafc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:var(--bg);
color:var(--text);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--header-bg);
color:white;
padding:15px 20px;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
display:none;
}

.container.active{
display:block;
}

.main-card{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-blue{
background:#3b82f6;
color:white;
}

.btn-green{
background:#10b981;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1e293b;
display:flex;
height:60px;
}

.nav-item{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#94a3b8;
cursor:pointer;
font-size:12px;
}

.nav-item.active{
color:#3b82f6;
}

.report-item{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

</style></head><body><div class="navbar">
<b>DIAMOND MANAGER</b>
</div><!-- APP --><div id="main-app" style="display:none"><div id="entry" class="container active"><h2>New Entry</h2><div class="main-card"><input id="barcode" placeholder="Packet Number"><input id="weight" placeholder="Weight"><input id="price" placeholder="Price"><input type="date" id="entryDate"><button class="btn btn-green" onclick="saveStone()">Save Stone</button>

</div></div><div id="reports" class="container"><h2>Reports</h2><div id="historyList"></div></div><div class="bottom-nav"><div class="nav-item active" onclick="showTab('entry')">
Entry
</div><div class="nav-item" onclick="showTab('reports')">
Reports
</div></div></div><!-- LOGIN SCREEN --><div id="auth-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#1e293b"><div style="background:white;padding:30px;border-radius:20px;width:90%;max-width:350px"><h2 style="text-align:center">Diamond Manager</h2><input id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button class="btn btn-blue" onclick="handleAuth()">Sign In</button>

<button class="btn btn-green" style="margin-top:10px" onclick="signUp()">Create Account</button>

<p style="text-align:center;margin-top:15px;color:#3b82f6;cursor:pointer" onclick="forgotPassword()">
Forgot Password?
</p></div></div><script>

const firebaseConfig={
apiKey:"AIzaSyDz2EoEj_Q-P1cNvr0t_IBOA5xqmC1Wmzo",
authDomain:"daimond-calculator.firebaseapp.com",
projectId:"daimond-calculator"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();


document.getElementById('entryDate').valueAsDate=new Date();


async function handleAuth(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

await auth.signInWithEmailAndPassword(email,password)

}catch(err){

alert(err.message)

}

}


async function signUp(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(!email||!password){

alert("Enter email and password")

return

}

try{

await auth.createUserWithEmailAndPassword(email,password)

alert("Account created")

}catch(err){

alert(err.message)

}

}



async function forgotPassword(){

const email=document.getElementById("email").value

if(!email){

alert("Enter email first")

return

}

try{

await auth.sendPasswordResetEmail(email)

alert("Password reset email sent")

}catch(err){

alert(err.message)

}

}



auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("auth-screen").style.display="none"

document.getElementById("main-app").style.display="block"

loadReports()

}else{

document.getElementById("auth-screen").style.display="flex"

document.getElementById("main-app").style.display="none"

}

})



async function saveStone(){

const stone={

barcode:document.getElementById("barcode").value,

weight:parseFloat(document.getElementById("weight").value),

price:parseFloat(document.getElementById("price").value),

date:document.getElementById("entryDate").value

}

await db.collection("stones").add(stone)

loadReports()

}



async function loadReports(){

const snap=await db.collection("stones").get()

let html=""

snap.forEach(doc=>{

const s=doc.data()

html+=`<div class="report-item">

<div>

<b>${s.barcode}</b><br>

${s.weight} ct @ ₹${s.price}

</div>

<div>

₹${s.weight*s.price}

</div>

</div>`

})

document.getElementById("historyList").innerHTML=html

}



function showTab(id){

document.querySelectorAll(".container").forEach(el=>el.classList.remove("active"))

document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script></body>
</html>
