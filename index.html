<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f3f4f6; --header: #1e293b; --accent: #3b82f6; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); }
        
        /* Header & Navigation */
        .navbar { background: var(--header); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: var(--header); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; color: white; cursor: pointer; opacity: 0.6; font-size: 13px; font-weight: 600; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        /* Stats Cards - Original UI */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: var(--header); color: white; text-align: center; border-radius: 0 0 15px 15px; margin-bottom: 15px; }
        .stat-val { font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 11px; opacity: 0.8; }

        /* Content Areas */
        .container { max-width: 500px; margin: auto; padding: 15px; display: none; }
        .container.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Inputs & Buttons - Original Styling */
        label { display: block; font-size: 12px; font-weight: bold; color: #64748b; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; background: #fff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: #10b981; }

        /* List Items */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: white; border-radius: 10px; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
        .delete-btn { color: #ef4444; font-size: 12px; font-weight: bold; border: none; background: none; }

        /* Hamburger Menu */
        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #1e293b; color: white; z-index: 1000; padding: 25px; transition: 0.3s; }
        .side-menu.open { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; }
        .overlay.active { display: block; }
        .menu-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-app">
    <div class="navbar">
        <b>DIAMOND MANAGER</b>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size:20px;">☰</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('entry')">ENTRY</div>
        <div class="tab" onclick="showTab('prices')">PRICES</div>
        <div class="tab" onclick="showTab('reports')">REPORTS</div>
    </div>

    <div id="stats-header" style="display:none;">
        <div class="stats-grid">
            <div><div class="stat-val" id="totalStones">0</div><div class="stat-lbl">Stones</div></div>
            <div><div class="stat-val" id="totalWeight">0.00</div><div class="stat-lbl">Weight</div></div>
            <div><div class="stat-val" id="totalValue">₹0</div><div class="stat-lbl">Value</div></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <h2 style="margin-bottom:30px">Settings</h2>
        <button class="menu-btn" style="background:#fff; color:#1e293b;" onclick="updateApp()">Update App Version</button>
        <button class="menu-btn" style="background:#fff; color:#1e293b;" onclick="toggleTheme()">Toggle Dark Mode</button>
        <button class="menu-btn" style="background:#ef4444; color:white; margin-top:50px" onclick="auth.signOut()">Logout</button>
    </div>

    <div id="entry" class="container active">
        <div class="card">
            <label>Packet Number</label>
            <input type="text" id="barcode" placeholder="Barcode/Packet no.">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Shape</label><select id="shape" onchange="lookupPrice()"><option>Oval</option><option>Pear</option><option>Marquise</option><option>Radiant</option><option>Emrald</option><option>Cushion</option></select></div>
                <div style="flex:1"><label>Cut</label><select id="cut" onchange="lookupPrice()"><option>Ex</option><option>VG</option></select></div>
            </div>
            <label>Weight (ct)</label>
            <input type="number" id="weight" step="0.01" oninput="lookupPrice()">
            <label>Price/ct (₹)</label>
            <input type="number" id="price" placeholder="Editable price">
            <button class="btn btn-green" onclick="saveStone()">Save Stone</button>
        </div>
    </div>

    <div id="prices" class="container">
        <div class="card">
            <h3>Set Rates</h3>
            <label>Department</label>
            <select id="p_grp"><option value="Fancy">Fancy (Pear, MQ, Oval)</option><option value="Step">Step (Emrald, Cushion, Radian etc.)</option></select>
            <label>Cut</label>
            <select id="p_cut"><option>Ex</option><option>VG</option></select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Min</label><input type="number" id="p_min" placeholder="e.g. 1"></div>
                <div style="flex:1"><label>Max</label><input type="number" id="p_max" placeholder="e.g. 2"></div>
            </div>
            <label>Rate (₹)</label>
            <input type="number" id="p_amt" placeholder="800">
            <button class="btn btn-blue" onclick="savePriceRule()">Save Rate</button>
        </div>
        <div id="priceList"></div>
    </div>

    <div id="reports" class="container">
        <input type="month" id="filterMonth" onchange="loadReports()" style="margin-bottom:15px;">
        <div id="historyList"></div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDz2EoEj_Q-P1cNvr0t_IBOA5xqmC1Wmzo", authDomain: "daimond-calculator.firebaseapp.com", projectId: "daimond-calculator", storageBucket: "daimond-calculator.firebasestorage.app", messagingSenderId: "1076337600089", appId: "1:1076337600089:web:dce0e8433eb4551c563348" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();
let userPrices = [];

// App Update Function
async function updateApp() {
    if (confirm("Clear cache and update to the latest version?")) {
        if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) { registration.unregister(); }
        }
        window.location.reload(true);
    }
}

function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
function showTab(id) {
    document.querySelectorAll('.container, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('stats-header').style.display = (id === 'reports') ? 'block' : 'none';
}

auth.onAuthStateChanged(user => {
    if(user) { loadPrices(); loadReports(); } else { /* redirect or handle login */ }
});

async function savePriceRule() {
    const r = { grp: document.getElementById('p_grp').value, cut: document.getElementById('p_cut').value, min: parseFloat(document.getElementById('p_min').value), max: parseFloat(document.getElementById('p_max').value), amt: parseFloat(document.getElementById('p_amt').value) };
    if(Object.values(r).some(v => isNaN(v) && typeof v !== 'string')) return alert("Fill all fields");
    await db.collection("users").doc(auth.currentUser.uid).collection("prices").add(r);
    loadPrices();
}

async function loadPrices() {
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("prices").get();
    userPrices = []; let h = '';
    snap.forEach(doc => {
        const r = doc.data(); userPrices.push(r);
        h += `<div class="list-item"><span>${r.grp} (${r.cut}) | ${r.min}-${r.max}ct</span><span><b>₹${r.amt}</b> <button onclick="delDoc('prices','${doc.id}',loadPrices)" style="color:red; margin-left:10px; border:none; background:none;">✕</button></span></div>`;
    });
    document.getElementById('priceList').innerHTML = h;
}

function lookupPrice() {
    const shp = document.getElementById('shape').value, cut = document.getElementById('cut').value, wt = parseFloat(document.getElementById('weight').value) || 0;
    const grp = ["Oval", "Marquise", "Pear"].includes(shp) ? "Fancy" : "Step";
    const match = userPrices.find(r => r.grp === grp && r.cut === cut && wt >= r.min && wt <= r.max);
    document.getElementById('price').value = match ? match.amt : "";
}

async function saveStone() {
    const s = { barcode: document.getElementById('barcode').value || "No ID", shape: document.getElementById('shape').value, cut: document.getElementById('cut').value, weight: parseFloat(document.getElementById('weight').value), price: parseFloat(document.getElementById('price').value), month: new Date().toISOString().slice(0,7), timestamp: firebase.firestore.FieldValue.serverTimestamp() };
    if(isNaN(s.weight) || isNaN(s.price)) return alert("Invalid entry");
    await db.collection("users").doc(auth.currentUser.uid).collection("stones").add(s);
    alert("Stone Saved!"); loadReports();
}

async function loadReports() {
    const m = document.getElementById('filterMonth').value || new Date().toISOString().slice(0,7);
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("stones").where("month", "==", m).get();
    let h = '', stones = 0, weight = 0, value = 0;
    snap.forEach(doc => {
        const s = doc.data();
        stones++; weight += s.weight; value += (s.weight * s.price);
        h += `<div class="list-item"><div><b>${s.barcode}</b><br><small>${s.shape} (${s.cut}) | ${s.weight}ct</small></div><div style="text-align:right"><b>₹${Math.round(s.weight * s.price)}</b><br><button class="delete-btn" onclick="delDoc('stones','${doc.id}',loadReports)">Delete</button></div></div>`;
    });
    document.getElementById('historyList').innerHTML = h;
    document.getElementById('totalStones').innerText = stones;
    document.getElementById('totalWeight').innerText = weight.toFixed(2);
    document.getElementById('totalValue').innerText = "₹" + Math.round(value).toLocaleString();
}

async function delDoc(c, id, cb) { if(confirm("Delete this?")) { await db.collection("users").doc(auth.currentUser.uid).collection(c).doc(id).delete(); cb(); } }
</script>
</body>
</html>
