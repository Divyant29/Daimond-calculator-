<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #3b82f6; --danger: #ef4444; --success: #10b981; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding-bottom: 20px; transition: 0.3s; }
        
        .navbar { background: #0f172a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .hamburger { font-size: 24px; cursor: pointer; }

        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--card); z-index: 1000; padding: 20px; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .side-menu.open { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; }
        .overlay.active { display: block; }

        .tabs { display: flex; background: #1e293b; }
        .tab { flex: 1; padding: 15px; text-align: center; color: white; cursor: pointer; opacity: 0.6; font-size: 11px; font-weight: bold; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        .container { max-width: 500px; margin: auto; padding: 15px; display: none; }
        .container.active { display: block; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: var(--card); color: var(--text); font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:flex; height:100vh; align-items:center; justify-content:center; background:#0f172a; padding:20px;">
    <div class="card" style="width: 100%; max-width: 350px;">
        <h2 style="margin-bottom:15px">Diamond Manager</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" style="background:var(--accent)" onclick="handleAuth()">Login / Sign Up</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <b>DIAMOND MGR</b> 
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('entry')">ENTRY</div>
        <div class="tab" onclick="showTab('prices')">PRICES</div>
        <div class="tab" onclick="showTab('reports')">REPORTS</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <h3 style="margin-bottom:20px">Settings</h3>
        <button class="btn" style="background:var(--accent)" onclick="toggleTheme()">Toggle Dark Mode</button>
        <button class="btn" style="background:var(--danger)" onclick="logout()">Logout</button>
    </div>

    <div id="entry" class="container active">
        <div class="card">
            <input type="text" id="barcode" placeholder="Packet Number">
            <select id="shape" onchange="lookupPrice()">
                <option value="Oval">Oval</option>
                <option value="Round">Round</option>
                <option value="Pear">Pear</option>
                <option value="Marquise">Marquise</option>
                <option value="Radiant">Radiant</option>
            </select>
            <select id="cut" onchange="lookupPrice()"><option>Ex</option><option>VG</option></select>
            <input type="number" id="weight" placeholder="Weight (ct)" step="0.01" oninput="lookupPrice()">
            <input type="number" id="price" placeholder="Rate ₹">
            <button class="btn" style="background:var(--success)" onclick="saveStone()">SAVE STONE</button>
        </div>
    </div>

    <div id="prices" class="container">
        <div class="card">
            <h3>Add Rate Rule</h3>
            <select id="p_grp">
                <option value="Fancy">Fancy (Oval, MQ, Pear)</option>
                <option value="Step">Step (Round, Radiant, etc.)</option>
            </select>
            <input type="number" id="p_min" placeholder="Min Weight">
            <input type="number" id="p_max" placeholder="Max Weight">
            <input type="number" id="p_amt" placeholder="Rate per ct (₹)">
            <button class="btn" style="background:var(--accent)" onclick="savePriceRule()">ADD PRICE RULE</button>
        </div>
        <div id="priceList"></div>
    </div>

    <div id="reports" class="container">
        <input type="month" id="filterMonth" onchange="loadReports()">
        <div id="historyList"></div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDz2EoEj_Q-P1cNvr0t_IBOA5xqmC1Wmzo", authDomain: "daimond-calculator.firebaseapp.com", projectId: "daimond-calculator", storageBucket: "daimond-calculator.firebasestorage.app", messagingSenderId: "1076337600089", appId: "1:1076337600089:web:dce0e8433eb4551c563348" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();
let userPrices = [];

// Menu & Theme
function toggleMenu() {
    document.getElementById('side-menu').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
}
function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
}

// Auth
async function handleAuth() {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    try { await auth.signInWithEmailAndPassword(e, p); } catch { await auth.createUserWithEmailAndPassword(e, p); }
}
auth.onAuthStateChanged(u => {
    document.getElementById('auth-screen').style.display = u ? 'none' : 'flex';
    document.getElementById('main-app').style.display = u ? 'block' : 'none';
    if(u) { loadPrices(); loadReports(); }
});
function logout() { auth.signOut(); toggleMenu(); }

// Logic
async function savePriceRule() {
    const r = { grp: document.getElementById('p_grp').value, min: parseFloat(document.getElementById('p_min').value), max: parseFloat(document.getElementById('p_max').value), amt: parseFloat(document.getElementById('p_amt').value) };
    if(isNaN(r.min) || isNaN(r.amt)) return alert("Please fill all fields");
    await db.collection("users").doc(auth.currentUser.uid).collection("prices").add(r);
    loadPrices();
}

async function loadPrices() {
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("prices").get();
    userPrices = []; let h = '';
    snap.forEach(d => {
        const r = d.data(); userPrices.push(r);
        h += `<div class="card row">
            <span>${r.grp} | ${r.min}-${r.max}ct | <b>₹${r.amt}</b></span>
            <button onclick="del('prices','${d.id}',loadPrices)" style="color:var(--danger); background:none; border:none; font-size:18px">✕</button>
        </div>`;
    });
    document.getElementById('priceList').innerHTML = h;
}

function lookupPrice() {
    const shp = document.getElementById('shape').value, wt = parseFloat(document.getElementById('weight').value) || 0;
    const grp = ["Oval", "Marquise", "Pear"].includes(shp) ? "Fancy" : "Step";
    const match = userPrices.find(r => r.grp === grp && wt >= r.min && wt <= r.max);
    document.getElementById('price').value = match ? match.amt : "";
}

async function saveStone() {
    const s = { barcode: document.getElementById('barcode').value, shape: document.getElementById('shape').value, cut: document.getElementById('cut').value, weight: parseFloat(document.getElementById('weight').value), price: parseFloat(document.getElementById('price').value), month: new Date().toISOString().slice(0,7), timestamp: firebase.firestore.FieldValue.serverTimestamp() };
    if(isNaN(s.weight)) return alert("Weight is empty!");
    await db.collection("users").doc(auth.currentUser.uid).collection("stones").add(s);
    alert("Saved!"); loadReports();
}

async function loadReports() {
    const m = document.getElementById('filterMonth').value || new Date().toISOString().slice(0,7);
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("stones").where("month", "==", m).get();
    let h = '';
    snap.forEach(d => {
        const s = d.data();
        h += `<div class="card row">
            <div><b>${s.barcode}</b><br><small>${s.weight}ct @ ₹${s.price}</small></div>
            <button onclick="del('stones','${d.id}',loadReports)" style="color:var(--danger); background:none; border:none; font-size:12px">Delete</button>
        </div>`;
    });
    document.getElementById('historyList').innerHTML = h;
}

async function del(c, id, cb) { if(confirm("Delete item?")) { await db.collection("users").doc(auth.currentUser.uid).collection(c).doc(id).delete(); cb(); } }

function showTab(id) {
    document.querySelectorAll('.container, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
</script>
</body>
</html>
