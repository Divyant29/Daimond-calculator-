<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Cloud Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; padding-bottom: 20px; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--primary); color: white; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; color: #333; }
        #main-app { display: none; }
        .tabs { display: flex; background: var(--primary); color: white; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; opacity: 0.6; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; display: none; }
        .container.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; }
        label { font-size: 11px; color: #64748b; font-weight: bold; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 12px; font-size: 15px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: white; }
        .summary-box { background: #0f172a; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; text-align: center; }
        .history-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
        #scanner-container { display: none; width: 100%; height: 200px; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="margin-bottom:15px">Sign Up</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (Min 6 chars)">
        <button class="btn btn-blue" id="auth-btn" onclick="handleAuth()">Create Account</button>
        <p style="margin-top:15px; font-size:12px; text-align:center" onclick="toggleAuth()">
            Already have an account? <span style="color:var(--accent); cursor:pointer">Login</span>
        </p>
    </div>
</div>

<div id="main-app">
    <div class="tabs">
        <div class="tab active" onclick="showTab('entry')">ENTRY</div>
        <div class="tab" onclick="showTab('prices')">PRICES</div>
        <div class="tab" onclick="showTab('reports')">REPORTS</div>
        <div class="tab" onclick="logout()" style="color:var(--danger)">LOGOUT</div>
    </div>

    <div id="entry" class="container active">
        <div id="scanner-container"></div>
        <div class="card">
            <label>Packet Number</label>
            <input type="text" id="barcode" placeholder="Barcode/Packet no.">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Shape</label>
                    <select id="shape" onchange="lookupPrice()">
                        <optgroup label="Fancy Cuts (Pear/MQ/Oval)"><option value="Oval">Oval</option><option value="Marquise">Marquise</option><option value="Pear">Pear</option></optgroup>
                        <optgroup label="Step Cuts (Other)"><option value="Round">Round</option><option value="Radiant">Radiant</option><option value="Emerald">Emerald</option><option value="Cushion">Cushion</option><option value="Princess">Princess</option></optgroup>
                    </select>
                </div>
                <div style="flex:1"><label>Cut</label><select id="cut" onchange="lookupPrice()"><option value="Ex">Ex</option><option value="VG">VG</option></select></div>
            </div>
            <label>Weight (ct)</label><input type="number" id="weight" step="0.01" oninput="lookupPrice()">
            <label>Price/ct (₹)</label><input type="number" id="price" style="background:#fefce8" readonly>
            <button class="btn btn-green" onclick="saveStone()">SAVE</button>
        </div>
    </div>

    <div id="prices" class="container">
        <div class="card">
            <h3>Set Rates</h3>
            <label>Department</label><select id="p_grp"><option value="Fancy">Fancy (Pear, MQ, Oval)</option><option value="Step">Step/Other (RD, Rad, etc.)</option></select>
            <label>Cut</label><select id="p_cut"><option value="Ex">Ex</option><option value="VG">VG</option></select>
            <div style="display:flex; gap:10px;"><input type="number" id="p_min" placeholder="Min Wt"><input type="number" id="p_max" placeholder="Max Wt"></div>
            <input type="number" id="p_amt" placeholder="Price per ct (₹)">
            <button class="btn btn-blue" onclick="savePriceRule()">SAVE RATE</button>
        </div>
        <div id="priceList"></div>
    </div>

    <div id="reports" class="container">
        <div class="summary-box">
            <div><h4 id="totCount">0</h4><small>Stones</small></div>
            <div><h4 id="totWt">0.00</h4><small>Weight</small></div>
            <div><h4 id="totVal">₹0</h4><small>Value</small></div>
        </div>
        <input type="month" id="filterMonth" onchange="loadReports()">
        <div id="historyList"></div>
    </div>
</div>

<script>
// YOUR FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyDz2EoEj_Q-P1cNvr0t_IBOA5xqmC1Wmzo",
    authDomain: "daimond-calculator.firebaseapp.com",
    projectId: "daimond-calculator",
    storageBucket: "daimond-calculator.firebasestorage.app",
    messagingSenderId: "1076337600089",
    appId: "1:1076337600089:web:dce0e8433eb4551c563348"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let isLoginMode = false;
let userPrices = [];

function toggleAuth() {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Sign Up";
    document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Create Account";
}

async function handleAuth() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    try {
        if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
        else await auth.createUserWithEmailAndPassword(email, pass);
    } catch(e) { alert(e.message); }
}

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('filterMonth').value = new Date().toISOString().slice(0,7);
        loadPrices(); loadReports();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
    }
});

function logout() { auth.signOut(); }

async function savePriceRule() {
    const rule = {
        grp: document.getElementById('p_grp').value,
        cut: document.getElementById('p_cut').value,
        min: parseFloat(document.getElementById('p_min').value),
        max: parseFloat(document.getElementById('p_max').value),
        amt: parseFloat(document.getElementById('p_amt').value)
    };
    await db.collection("users").doc(auth.currentUser.uid).collection("prices").add(rule);
    loadPrices();
}

async function loadPrices() {
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("prices").get();
    userPrices = [];
    let html = '';
    snap.forEach(doc => {
        const r = doc.data();
        userPrices.push(r);
        html += `<div class="card" style="display:flex; justify-content:space-between; font-size:12px">
            <span>${r.grp} (${r.cut}) | ${r.min}-${r.max}ct</span>
            <b>₹${r.amt} <span style="color:red; margin-left:10px" onclick="deleteDoc('prices','${doc.id}',loadPrices)">✕</span></b>
        </div>`;
    });
    document.getElementById('priceList').innerHTML = html;
}

function lookupPrice() {
    const shp = document.getElementById('shape').value;
    const cut = document.getElementById('cut').value;
    const wt = parseFloat(document.getElementById('weight').value) || 0;
    const grp = ["Oval", "Marquise", "Pear"].includes(shp) ? "Fancy" : "Step";
    const match = userPrices.find(r => r.grp === grp && r.cut === cut && wt >= r.min && wt <= r.max);
    document.getElementById('price').value = match ? match.amt : 0;
}

async function saveStone() {
    const stone = {
        barcode: document.getElementById('barcode').value || "No ID",
        shape: document.getElementById('shape').value,
        cut: document.getElementById('cut').value,
        weight: parseFloat(document.getElementById('weight').value),
        price: parseFloat(document.getElementById('price').value),
        month: new Date().toISOString().slice(0, 7),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    if(isNaN(stone.weight)) return alert("Weight is missing!");
    await db.collection("users").doc(auth.currentUser.uid).collection("stones").add(stone);
    document.getElementById('barcode').value = ''; document.getElementById('weight').value = '';
    loadReports();
}

async function loadReports() {
    const month = document.getElementById('filterMonth').value;
    const snap = await db.collection("users").doc(auth.currentUser.uid).collection("stones")
        .where("month", "==", month).orderBy("timestamp", "desc").get();
    let html = '', tC = 0, tW = 0, tV = 0;
    snap.forEach(doc => {
        const s = doc.data();
        const total = s.weight * s.price;
        tC++; tW += s.weight; tV += total;
        html += `<div class="history-item">
            <div><b>${s.barcode}</b><br><small>${s.shape} (${s.cut}) | ${s.weight}ct</small></div>
            <div style="text-align:right">₹${total.toLocaleString()}<br><small style="color:red" onclick="deleteDoc('stones','${doc.id}',loadReports)">Delete</small></div>
        </div>`;
    });
    document.getElementById('historyList').innerHTML = html;
    document.getElementById('totCount').innerText = tC;
    document.getElementById('totWt').innerText = tW.toFixed(2);
    document.getElementById('totVal').innerText = '₹' + tV.toLocaleString();
}

async function deleteDoc(coll, id, cb) { if(confirm("Delete item?")) { await db.collection("users").doc(auth.currentUser.uid).collection(coll).doc(id).delete(); cb(); } }

function showTab(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function startScan() {
    const con = document.getElementById('scanner-container');
    con.style.display = 'block';
    Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: con }, decoder: { readers: ["code_128_reader", "ean_reader"] } }, (err) => { if(!err) Quagga.start(); });
    Quagga.onDetected(r => { document.getElementById('barcode').value = r.codeResult.code; Quagga.stop(); con.style.display='none'; });
}
</script>
</body>
</html>
